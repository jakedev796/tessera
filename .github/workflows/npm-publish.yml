name: Publish npm Package

on:
  workflow_dispatch:
    inputs:
      dist_tag_version:
        description: Existing package version to mark as latest without publishing
        required: false
        type: string
      unpublish_versions:
        description: Comma or space separated old versions to unpublish after publishing
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Read package metadata
        run: |
          echo "PACKAGE_NAME=$(node -p "require('./package.json').name")" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: ${{ github.event.inputs.dist_tag_version == '' }}
        run: npm ci

      - name: Build package
        if: ${{ github.event.inputs.dist_tag_version == '' }}
        run: npm run npm:prepack
        env:
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}

      - name: Verify package
        if: ${{ github.event.inputs.dist_tag_version == '' }}
        run: npm pack --dry-run --ignore-scripts

      - name: Publish package
        if: ${{ github.event.inputs.dist_tag_version == '' }}
        run: npm publish --ignore-scripts --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Mark package as latest
        run: |
          version="${DIST_TAG_VERSION:-$PACKAGE_VERSION}"
          npm dist-tag add "$PACKAGE_NAME@$version" latest
        env:
          DIST_TAG_VERSION: ${{ github.event.inputs.dist_tag_version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Unpublish old package versions
        if: ${{ github.event.inputs.unpublish_versions != '' }}
        run: |
          set -euo pipefail

          versions="${UNPUBLISH_VERSIONS//,/ }"
          for version in $versions; do
            npm unpublish "$PACKAGE_NAME@$version" --force
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          UNPUBLISH_VERSIONS: ${{ github.event.inputs.unpublish_versions }}
