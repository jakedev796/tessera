name: Publish Desktop Builds

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and attach desktop assets to
        required: true
        type: string
      build_windows:
        description: Build and upload the Windows portable .exe
        required: true
        type: boolean
        default: true
      build_macos:
        description: Build and upload macOS .dmg assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest

    steps:
      - name: Require at least one desktop target
        run: |
          if [[ "${{ inputs.build_windows }}" != "true" && "${{ inputs.build_macos }}" != "true" ]]; then
            echo "At least one desktop target must be enabled."
            exit 1
          fi

  build-windows:
    name: Build Windows x64
    needs: validate
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: npm run electron:build:win
        env:
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: tessera-windows-x64
          path: release/*.exe
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    needs: validate
    if: ${{ inputs.build_macos }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print runner architecture
        run: |
          uname -m
          sw_vers

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_API_KEY_BASE64:-}" ]]; then
            echo "APPLE_API_KEY_BASE64 is not set; using Apple ID notarization credentials if present."
            exit 0
          fi

          if [[ -z "${APPLE_API_KEY_ID_SECRET:-}" || -z "${APPLE_API_ISSUER_SECRET:-}" ]]; then
            echo "APPLE_API_KEY_BASE64 requires APPLE_API_KEY_ID and APPLE_API_ISSUER."
            exit 1
          fi

          key_dir="$RUNNER_TEMP/apple-notary"
          key_path="$key_dir/AuthKey_${APPLE_API_KEY_ID_SECRET}.p8"
          mkdir -p "$key_dir"

          if ! printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path" 2>/dev/null; then
            printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$key_path"
          fi

          {
            echo "APPLE_API_KEY=$key_path"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_SECRET"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_SECRET"
          } >> "$GITHUB_ENV"

      - name: Build desktop package
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          TESSERA_NOTARY_TIMEOUT: 90m
        run: npm run electron:build:mac-${{ matrix.arch }}:signed

      - name: Verify DMG
        run: |
          version="$(node -p "require('./package.json').version")"
          dmg="release/Tessera-${version}-macos-${{ matrix.arch }}.dmg"
          test -f "$dmg"
          hdiutil verify "$dmg"
          xcrun stapler validate "$dmg"
          spctl --assess --type open --context context:primary-signature --verbose "$dmg"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: tessera-macos-${{ matrix.arch }}
          path: release/Tessera-*-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error
          retention-days: 7

  release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-windows
      - build-macos
    if: >-
      ${{
        always() &&
        needs.validate.result == 'success' &&
        needs.build-windows.result != 'failure' &&
        needs.build-windows.result != 'cancelled' &&
        needs.build-macos.result != 'failure' &&
        needs.build-macos.result != 'cancelled' &&
        (needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
      }}

    env:
      RELEASE_TAG: ${{ inputs.tag }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(artifacts/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No desktop assets found."
            exit 1
          fi

          release_args=()
          if [[ "$RELEASE_TAG" == *alpha* || "$RELEASE_TAG" == *beta* || "$RELEASE_TAG" == *rc* ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              "${release_args[@]}"
          fi
